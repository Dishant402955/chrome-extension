<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Recorder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141517;--sur:#1e2023;--sur2:#27292d;
  --bdr:#2c2f34;--bdr2:#3a3e45;
  --acc:#e03535;--acc2:#7a1a1a;--grn:#2ea84a;
  --txt:#b8bcc4;--txt2:#525660;--txth:#eceef2;
  --mono:ui-monospace,'Cascadia Code','Fira Code',monospace;
}
html,body{width:300px;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:11px;line-height:1.5;overflow:hidden;user-select:none}

.hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--sur);border-bottom:1px solid var(--bdr)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);flex-shrink:0}
.dot.live{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,53,53,.7)}50%{box-shadow:0 0 0 5px rgba(224,53,53,0)}}
.title{color:var(--txth);font-size:10px;letter-spacing:.14em;text-transform:uppercase;flex:1}
.ver{color:var(--txt2);font-size:9px}

.body{padding:12px;display:flex;flex-direction:column;gap:10px}

.info-box{padding:9px 10px;background:var(--sur2);border:1px solid var(--bdr);display:flex;flex-direction:column;gap:5px}
.info-box p{color:var(--txt);font-size:10px;line-height:1.6}
.info-box b{color:var(--txth)}

.quals{display:flex;gap:4px}
.qual{flex:1;padding:6px 4px;text-align:center;border:1px solid var(--bdr);cursor:pointer;transition:border-color .1s,color .1s;color:var(--txt2)}
.qual:hover{border-color:var(--bdr2);color:var(--txt)}
.qual.sel{border-color:var(--txth);color:var(--txth)}
.qual-name{font-size:10px;font-weight:600}
.qual-desc{font-size:8px;margin-top:1px;opacity:.7}

.stats{display:none;flex-direction:column;gap:4px;padding:8px 10px;background:var(--sur2);border:1px solid var(--bdr)}
.stats.show{display:flex}
.st{display:flex;justify-content:space-between}
.st-k{color:var(--txt2);font-size:9px}
.st-v{color:var(--txth);font-size:10px}

.foot{padding:10px 12px;background:var(--sur);border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:6px}
.status-row{display:flex;justify-content:space-between;align-items:center}
.status{color:var(--txt2);font-size:9px;letter-spacing:.08em}
.status.live{color:var(--acc)}.status.done{color:var(--grn)}.status.err{color:#e08c00}
.timer{color:var(--txth);font-size:12px;font-feature-settings:"tnum"}

.btn{width:100%;padding:9px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid;cursor:pointer;transition:background .15s,color .15s,opacity .15s}
.btn:disabled{opacity:.32;cursor:not-allowed}
.btn-start{background:transparent;border-color:var(--grn);color:var(--grn)}
.btn-start:not(:disabled):hover{background:var(--grn);color:#fff}
.btn-stop{background:transparent;border-color:var(--acc);color:var(--acc);animation:bb 1.5s ease-in-out infinite}
.btn-stop:not(:disabled):hover{background:var(--acc);color:#fff}
@keyframes bb{0%,100%{border-color:var(--acc)}50%{border-color:var(--acc2)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="dot" id="dot"></div>
  <span class="title">Recorder</span>
  <span class="ver">v6</span>
</div>

<div class="body">

  <div class="info-box">
    <p>1. Click <b>Start Recording</b> below.</p>
    <p>2. A screen picker will appear — <b>select the tab you want to record.</b></p>
    <p>3. Interaction logs will automatically follow that same tab.</p>
  </div>

  <div>
    <div style="color:var(--txt2);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px">Quality</div>
    <div class="quals" id="qualList"></div>
  </div>

  <div class="stats" id="stats">
    <div class="st"><span class="st-k">SAMPLES</span><span class="st-v" id="stSamples">0</span></div>
    <div class="st"><span class="st-k">WEBCAM</span><span class="st-v" id="stWebcam">—</span></div>
  </div>

</div>

<div class="foot">
  <div class="status-row">
    <span class="status" id="statusEl">READY</span>
    <span class="timer"  id="timerEl"></span>
  </div>
  <button class="btn btn-start" id="btnStart">▶  Start Recording</button>
  <button class="btn btn-stop"  id="btnStop" style="display:none">⏹  Stop &amp; Save</button>
</div>

<script src="panel.js"></script>
</body>
</html>
